name: CI

on:
  push:
    branches: [main, develop, onboarding-steps]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select compatible Xcode
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app || true
          # Xcode 26 ships on these images but is incompatible with the
          # runner's macOS 15.x (no usable iOS simulators). Prefer the
          # newest Xcode 16.x, falling back to the default.
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          [ -z "$XC" ] && XC=/Applications/Xcode.app
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Build & Test
        run: |
          set -o pipefail
          echo "Eligible simulators:"
          xcrun simctl list devices available | grep -E 'iPhone' || true
          xcodebuild test \
            -project stash/stash.xcodeproj \
            -scheme stash \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:stashTests \
            -resultBundlePath TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
