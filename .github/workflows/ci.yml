name: CI

# Runs on pull requests only. Pushes to main happen via merged PRs, which
# were already checked here, so a separate push run would just burn macOS
# minutes for nothing.
on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    # SwiftLint runs on Linux, so keep it off the 10x-billed macOS runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SwiftLint
        run: docker run --rm -v "$PWD:/work" -w /work ghcr.io/realm/swiftlint:latest swiftlint --strict

  build-and-test:
    name: Build & Test
    # macos-15 is needed for Xcode 16.x (Xcode 15 on macos-14 can't read the
    # project). The image's pre-created simulators are iOS 26 only, which
    # Xcode 16 can't use, so create an iOS 18 simulator from its runtime.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      - name: Build & Test
        run: |
          set -o pipefail
          RT=$(xcrun simctl list runtimes available | grep -oE 'com.apple.CoreSimulator.SimRuntime.iOS-1[0-9-]+' | head -1)
          if [ -z "$RT" ]; then
            echo "No iOS 1x runtime; downloading"
            xcodebuild -downloadPlatform iOS
            RT=$(xcrun simctl list runtimes available | grep -oE 'com.apple.CoreSimulator.SimRuntime.iOS-1[0-9-]+' | head -1)
          fi
          echo "Runtime: $RT"
          UDID=$(xcrun simctl create ci-iphone com.apple.CoreSimulator.SimDeviceType.iPhone-16 "$RT")
          echo "Created simulator: $UDID"
          # Boot and wait until ready — a freshly created sim that xcodebuild
          # clones for parallel testing can fail to launch the test host
          # ("launchSession should not be nil", exit 134).
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID"
          xcodebuild test \
            -project stash/stash.xcodeproj \
            -scheme stash \
            -destination "id=$UDID" \
            -only-testing:stashTests \
            -parallel-testing-enabled NO \
            -resultBundlePath TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
