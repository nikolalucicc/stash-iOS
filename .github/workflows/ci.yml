name: CI

on:
  push:
    branches: [main, develop, onboarding-steps]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  build-and-test:
    name: Build & Test
    # macos-14 ships a stable Xcode (iOS 17/18) whose simulators are
    # pre-created and eligible. The macos-15 image bundles Xcode 26, which
    # is incompatible with its own macOS 15.x, leaving no usable iOS sim.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild -version
          echo "Available simulators:"
          xcrun simctl list devices available | grep -E 'iPhone' || true
          UDID=$(xcrun simctl list devices available | grep iPhone | grep -oE '[0-9A-F-]{36}' | head -1)
          echo "Using simulator: $UDID"
          xcodebuild test \
            -project stash/stash.xcodeproj \
            -scheme stash \
            -destination "id=$UDID" \
            -only-testing:stashTests \
            -resultBundlePath TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
