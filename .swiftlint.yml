included:
  - stash/stash

excluded:
  - stash/stashTests
  - stash/stashUITests

opt_in_rules:
  - empty_count
  - force_unwrapping

disabled_rules:
  - trailing_whitespace
  - sorted_imports
  - trailing_comma
  - type_name

line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 1000
